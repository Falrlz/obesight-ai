<h2 class="sr-only">Interactive particle field where particles drift and respond to cursor movement with gravitational pull and connecting lines.</h2>
<div style="position: relative; width: 100%; border-radius: 12px; overflow: hidden; background: #0a0a0f;">
  <canvas id="pf" style="display:block; width:100%; height:460px;"></canvas>
  <div style="position:absolute; top:14px; left:16px; display:flex; gap:8px; align-items:center; pointer-events:none;">
    <span style="font-size:12px; color:#8a8aa0; letter-spacing:.04em;">move your cursor · drag to disturb</span>
  </div>
  <div style="position:absolute; top:12px; right:12px; display:flex; gap:6px;">
    <button id="modeBtn" style="pointer-events:auto; background:rgba(255,255,255,.06); border:.5px solid rgba(255,255,255,.18); color:#d8d8e8; font-size:12px; padding:6px 12px; border-radius:8px; cursor:pointer;">attract</button>
    <button id="resetBtn" style="pointer-events:auto; background:rgba(255,255,255,.06); border:.5px solid rgba(255,255,255,.18); color:#d8d8e8; font-size:12px; padding:6px 12px; border-radius:8px; cursor:pointer;">reset</button>
  </div>
</div>
<script>
(function(){
  const canvas = document.getElementById('pf');
  const ctx = canvas.getContext('2d');
  const modeBtn = document.getElementById('modeBtn');
  const resetBtn = document.getElementById('resetBtn');
  let W, H, dpr;
  let mode = 1;
  const mouse = { x: -9999, y: -9999, active: false, down: false };
  let particles = [];
  const palette = ['#6c63ff','#4ac6b7','#8f7bff','#3ba0e0','#c77dff'];

  function resize(){
    dpr = Math.min(window.devicePixelRatio||1, 2);
    const r = canvas.getBoundingClientRect();
    W = r.width; H = r.height;
    canvas.width = W*dpr; canvas.height = H*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }

  function init(){
    resize();
    const count = Math.round((W*H)/9000);
    particles = [];
    for(let i=0;i<count;i++){
      particles.push({
        x: Math.random()*W,
        y: Math.random()*H,
        vx: (Math.random()-.5)*0.4,
        vy: (Math.random()-.5)*0.4,
        r: Math.random()*1.8+1,
        c: palette[(Math.random()*palette.length)|0]
      });
    }
  }

  function step(){
    ctx.clearRect(0,0,W,H);
    const linkDist = 110;
    for(let i=0;i<particles.length;i++){
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      if(p.x<0||p.x>W) p.vx*=-1;
      if(p.y<0||p.y>H) p.vy*=-1;
      p.x = Math.max(0,Math.min(W,p.x));
      p.y = Math.max(0,Math.min(H,p.y));

      if(mouse.active){
        const dx = mouse.x-p.x, dy = mouse.y-p.y;
        const d2 = dx*dx+dy*dy;
        const range = mouse.down?200:150;
        if(d2 < range*range && d2>1){
          const d = Math.sqrt(d2);
          const f = (1 - d/range) * 0.6 * mode;
          p.vx += (dx/d)*f;
          p.vy += (dy/d)*f;
        }
      }
      p.vx *= 0.96; p.vy *= 0.96;
      const sp = Math.hypot(p.vx,p.vy);
      if(sp < 0.15){
        const a = Math.random()*Math.PI*2;
        p.vx += Math.cos(a)*0.05; p.vy += Math.sin(a)*0.05;
      }
      if(sp > 3){ p.vx*=0.7; p.vy*=0.7; }
    }

    for(let i=0;i<particles.length;i++){
      const a = particles[i];
      for(let j=i+1;j<particles.length;j++){
        const b = particles[j];
        const dx = a.x-b.x, dy = a.y-b.y;
        const d2 = dx*dx+dy*dy;
        if(d2 < linkDist*linkDist){
          const al = (1 - Math.sqrt(d2)/linkDist)*0.5;
          ctx.strokeStyle = 'rgba(120,120,200,'+al.toFixed(3)+')';
          ctx.lineWidth = 0.6;
          ctx.beginPath();
          ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
        }
      }
    }

    for(const p of particles){
      ctx.beginPath();
      ctx.fillStyle = p.c;
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fill();
    }

    if(mouse.active){
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 0.5;
      ctx.arc(mouse.x,mouse.y, mouse.down?200:150,0,Math.PI*2);
      ctx.stroke();
    }
    requestAnimationFrame(step);
  }

  function pos(e){
    const r = canvas.getBoundingClientRect();
    const t = e.touches?e.touches[0]:e;
    mouse.x = t.clientX-r.left; mouse.y = t.clientY-r.top; mouse.active = true;
  }
  canvas.addEventListener('mousemove', pos);
  canvas.addEventListener('mousedown', e=>{mouse.down=true; pos(e);});
  window.addEventListener('mouseup', ()=>mouse.down=false);
  canvas.addEventListener('mouseleave', ()=>mouse.active=false);
  canvas.addEventListener('touchmove', e=>{pos(e); e.preventDefault();}, {passive:false});
  canvas.addEventListener('touchstart', e=>{mouse.down=true; pos(e);});
  canvas.addEventListener('touchend', ()=>{mouse.down=false; mouse.active=false;});

  modeBtn.addEventListener('click', ()=>{
    mode = -mode;
    modeBtn.textContent = mode===1?'attract':'repel';
  });
  resetBtn.addEventListener('click', init);
  window.addEventListener('resize', ()=>{resize(); init();});

  init(); step();
})();
</script>
